<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghibli Production Dashboard - 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ghibli Production Hub</h1>
            <p class="subtitle">Streamlined Animated Storytelling for 2026</p>
        </header>

        <div class="create-btn-container">
            <button class="btn-large" onclick="createNewVideo()">✨ Start New Video Production</button>
        </div>

        <section class="card">
            <div class="step-container" id="steps-list">
                <!-- Steps will be injected here by app.js -->
            </div>
        </section>

        <footer style="text-align: center; margin-top: 50px; opacity: 0.5; font-size: 0.8rem;">
            <p>Monetization Safe Strategy • Studio Ghibli Aesthetic • Human-Signal Design</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
